<!DOCTYPE html>
<html>
<head>
    <title>Reset Password | PulseAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #f8f9fa, #e0e7ff); height: 100vh; }
        .reset-card { border-radius: 20px; background: white; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0A2647; border: none; }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 reset-card">
                <h4 class="text-center mb-4">Reset Your Password</h4>
                <p class="text-muted text-center small">Enter your email address and we'll send you a link to reset your password.</p>
                
                <form method="POST">
                    <div class="mb-3">
                        <input type="email" name="email" class="form-control" placeholder="Enter your email" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Send Reset Link</button>
                </form>
                <div class="text-center mt-3">
                    <a href="{{ url_for('login') }}" class="text-secondary small">Back to Login</a>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
