<!DOCTYPE html>
<html>
<head>
    <title>Login | PulseAI</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <style>
        body { background: linear-gradient(135deg, #f8f9fa, #e0e7ff); height: 100vh; }
        .login-card { border-radius: 20px; background: white; padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .btn-primary { background-color: #0A2647; border: none; padding: 12px; }
        .btn-primary:hover { background-color: #144272; }
        .medical-blue { color: #0A2647; font-weight: bold; }
        .forgot-link { color: #6c757d; font-size: 0.9rem; text-decoration: none; }
        .forgot-link:hover { text-decoration: underline; color: #0A2647; }
    </style>
</head>
<body class="d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-4 login-card">
                <h3 class="text-center medical-blue mb-4">Welcome Back to PulseAI</h3>

                {% with messages = get_flashed_messages(with_categories=true) %}
                  {% if messages %}
                    {% for category, message in messages %}
                      <div class="alert alert-{{ category }}">{{ message }}</div>
                    {% endfor %}
                  {% endif %}
                {% endwith %}

                <form method="POST">
                    <div class="mb-3">
                        <input type="text" name="username" class="form-control" placeholder="Username" required>
                    </div>
                    <div class="mb-3">
                        <input type="password" name="password" class="form-control" placeholder="Password" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Login</button>
                </form>
                
                <div class="text-center mt-3">
                    <p class="mb-1">
                        <a href="{{ url_for('forgot_password') }}" class="forgot-link">Forgot password?</a>
                    </p>
                    <small>New user? <a href="{{ url_for('signup') }}" style="color: #0A2647; font-weight: 500;">Create an account</a></small>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
